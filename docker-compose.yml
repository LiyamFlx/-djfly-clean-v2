version: '3.8'

services:
  # DJfly Frontend Application
  djfly-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: djfly-frontend
    ports:
      - "80:80"
      - "443:443"
    environment:
      - NODE_ENV=production
    volumes:
      # SSL certificates (if using HTTPS)
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - djfly-backend
    networks:
      - djfly-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.djfly-frontend.rule=Host(`djfly.example.com`)"
      - "traefik.http.routers.djfly-frontend.tls=true"
      - "traefik.http.routers.djfly-frontend.tls.certresolver=letsencrypt"

  # DJfly Backend API (placeholder - would need actual backend implementation)
  djfly-backend:
    image: node:20-alpine
    container_name: djfly-backend
    working_dir: /app
    command: sh -c "echo 'Backend placeholder - implement your API server here' && sleep infinity"
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://djfly:password@postgres:5432/djfly
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your-jwt-secret-here
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - postgres
      - redis
    networks:
      - djfly-network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: djfly-postgres
    environment:
      POSTGRES_DB: djfly
      POSTGRES_USER: djfly
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - djfly-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U djfly"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: djfly-redis
    command: redis-server --appendonly yes --requirepass redispassword
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - djfly-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy (optional, for load balancing)
  nginx-proxy:
    image: nginx:alpine
    container_name: djfly-proxy
    ports:
      - "8080:80"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - djfly-frontend
    networks:
      - djfly-network
    restart: unless-stopped

  # Traefik Load Balancer (alternative to nginx-proxy)
  traefik:
    image: traefik:v3.0
    container_name: djfly-traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@example.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "8080:8080"  # Traefik dashboard
      - "80:80"      # HTTP
      - "443:443"    # HTTPS
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt_data:/letsencrypt
    networks:
      - djfly-network
    restart: unless-stopped
    profiles:
      - traefik

  # Monitoring with Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: djfly-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - djfly-network
    restart: unless-stopped
    profiles:
      - monitoring

  # Grafana for metrics visualization
  grafana:
    image: grafana/grafana:latest
    container_name: djfly-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    networks:
      - djfly-network
    restart: unless-stopped
    profiles:
      - monitoring

networks:
  djfly-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  letsencrypt_data: